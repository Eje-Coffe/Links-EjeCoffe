<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EJE Café</title>
<style>
html, body {
  margin: 0; padding: 0;
  min-height: 100vh;
  background-color: #111111;
  font-family: Arial, sans-serif;
}
.page {
  min-height: 100vh;
  background-color: #111111;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}
.logo-box {
  border: 3px solid #f5f2ee;
  padding: 10px 28px;
  margin-bottom: 16px;
}
.logo-text {
  font-size: 52px;
  letter-spacing: 8px;
  color: #f5f2ee;
  display: block;
  line-height: 1;
  font-weight: 900;
}
.tagline {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #c8956c;
  margin-bottom: 6px;
  text-align: center;
}
.sub {
  font-size: 13px;
  color: #999999;
  text-align: center;
  margin-bottom: 40px;
  line-height: 1.6;
}
.btn {
  width: 100%;
  max-width: 380px;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  text-decoration: none;
  background-color: #1e1e1e;
  border: 1px solid #333333;
  margin-bottom: 12px;
  cursor: pointer;
}
.btn:hover { background-color: #252525; border-color: #c8956c; }
.icon-circle {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.icon-wa  { background-color: #25D366; }
.icon-ig  { background: linear-gradient(135deg,#f09433,#dc2743,#bc1888); }
.icon-fb  { background-color: #1877F2; }
.icon-web { background-color: #444444; }
.icon-circle svg { width: 20px; height: 20px; fill: white; }
.label-main { display: block; font-size: 15px; font-weight: bold; color: #f5f2ee; margin-bottom: 2px; }
.label-sub  { display: block; font-size: 12px; color: #777777; }
.arrow { margin-left: auto; color: #555555; font-size: 18px; }
.divider { width: 100%; max-width: 380px; display: flex; align-items: center; gap: 12px; margin: 4px 0 16px; }
.line { flex: 1; height: 1px; background-color: #2a2a2a; }
.divider-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #444444; }
.btn-disabled { opacity: 0.4; cursor: default; border-style: dashed; }
.badge { margin-left: auto; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #c8956c; background-color: #1f1508; border: 1px solid #3a2a10; padding: 3px 8px; white-space: nowrap; }
.footer { margin-top: 40px; text-align: center; }
.footer p { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #333333; }
</style>
</head>
